<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>To-do List</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#3b82f6">

<style>
:root{
--bg:#f1f5f9;
--card:#ffffff;
--accent:#3b82f6;
--danger:#ef4444;
--text:#0f172a;
--sub:#64748b;
}

body{
background:linear-gradient(135deg,#e2e8f0,#cbd5f5);
font-family:'Segoe UI',sans-serif;
margin:0;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
color:var(--text);
}

.quest-card{
background:var(--card);
width:100%;
max-width:420px;
padding:30px;
border-radius:16px;
box-shadow:0 15px 40px rgba(0,0,0,0.15);
}

h1{
text-align:center;
margin-bottom:20px;
font-size:1.8rem;
letter-spacing:1px;
}

.input-group{
display:flex;
gap:10px;
margin-bottom:15px;
}

input{
flex:1;
padding:12px;
border-radius:8px;
border:1px solid #d1d5db;
font-size:1rem;
outline:none;
}

input:focus{
border-color:var(--accent);
box-shadow:0 0 0 2px rgba(59,130,246,0.2);
}

.btn-add{
background:var(--accent);
color:white;
border:none;
padding:10px 18px;
border-radius:8px;
font-weight:600;
cursor:pointer;
transition:.2s;
}

.btn-add:hover{
opacity:.9;
transform:scale(1.05);
}

ul{
list-style:none;
padding:0;
margin-top:15px;
}

li{
background:#f8fafc;
padding:12px 15px;
border-radius:10px;
margin-bottom:10px;
display:flex;
justify-content:space-between;
align-items:center;
border:1px solid #e2e8f0;
transition:.2s;
}

li:hover{
background:#eef2ff;
}

.btn-outline-danger{
background:var(--danger);
color:white;
border:none;
width:28px;
height:26px;
border-radius:6px;
cursor:pointer;
font-weight:bold;
}

.btn-outline-danger:hover{
opacity:.85;
}
</style>
</head>

<body>

<div class="quest-card">
<h1>Task List</h1>

<div class="input-group">
<input type="text" id="taskInput" placeholder="Write Task...">
<button class="btn-add" onclick="addTask()">Add</button>
</div>

<ul id="taskList"></ul>

</div>

<script>

const taskList = document.getElementById("taskList");

function addTask() {
const input = document.getElementById("taskInput");
const task = input.value.trim();

if (task) {
const li = document.createElement("li");

li.className =
"list-group-item d-flex justify-content-between align-items-center mb-2 rounded shadow-sm border";

li.innerHTML = `
<span>${task}</span>
<button class="btn btn-outline-danger btn-sm" onclick="this.parentElement.remove()">X</button>
`;

taskList.appendChild(li);
input.value = "";
}
}

if ("serviceWorker" in navigator) {
navigator.serviceWorker
.register("/service-worker.js")
.then(() => {
console.log("ayos! rehistro as service worker");
})
.catch((error) => {
console.log("Registration failed: ", error);
});
}

</script>

</body>
</html>
